<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipadas — TikTok Autorizado</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d0d0d; color: #e5e5e5;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; padding: 20px; }
    .box { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px;
           padding: 36px; max-width: 480px; width: 100%; text-align: center; }
    h2  { color: #7c3aed; margin-bottom: 12px; }
    p   { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
    .code-box { background: #0a0a0a; border: 2px solid #7c3aed; border-radius: 8px;
                padding: 16px; font-family: monospace; font-size: 13px;
                word-break: break-all; color: #fff; margin-bottom: 20px; min-height: 52px; }
    .btn { background: #7c3aed; color: #fff; border: none; padding: 12px 28px;
           border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 700; }
    .btn:hover { background: #6d28d9; }
    .ok   { color: #10b981; font-weight: 700; }
    .erro { color: #ef4444; }
  </style>
</head>
<body>
  <div class="box">
    <h2>TikTok Autorizado</h2>
    <p>Copie o código abaixo e cole no campo que apareceu no painel do Clipadas:</p>
    <div class="code-box" id="codigo">Carregando...</div>
    <button class="btn" onclick="copiar()">Copiar Código</button>
    <p id="msg" style="margin-top:14px"></p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code   = params.get("code")  || "";
    const erro   = params.get("error") || "";

    if (erro) {
      document.getElementById("codigo").textContent = "Erro: " + erro;
    } else if (code) {
      document.getElementById("codigo").textContent = code;
    } else {
      document.getElementById("codigo").textContent = "Nenhum código na URL.";
    }

    function copiar() {
      const msg = document.getElementById("msg");
      navigator.clipboard.writeText(code).then(() => {
        msg.textContent = "Copiado! Cole no painel do Clipadas e clique OK.";
        msg.className = "ok";
      }).catch(() => {
        msg.textContent = "Selecione e copie o código manualmente.";
        msg.className = "erro";
      });
    }
  </script>
</body>
</html>
